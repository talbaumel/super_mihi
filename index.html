<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Super Mihi Bros</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #5c94fc;
    height: 100%;
    overflow: hidden;
    font-family: "Press Start 2P", monospace, sans-serif;
    color: #fff;
    image-rendering: pixelated;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(#5c94fc 0%, #5c94fc 70%, #87b8ff 100%);
    image-rendering: pixelated;
  }
  #world {
    position: absolute;
    left: 0;
    top: 0;
    transform-origin: 0 0;
    will-change: transform;
  }
  .sprite {
    position: absolute;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    transform-origin: center;
    pointer-events: none;
  }
  .face-left { transform: scaleX(-1); }
  #hud {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    font-family: monospace;
    font-size: 22px;
    text-shadow: 2px 2px 0 #000;
    z-index: 10;
    user-select: none;
  }
  #hud .group { display: flex; align-items: center; gap: 8px; }
  #hud img { image-rendering: pixelated; height: 32px; }
  #overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-family: monospace;
    text-align: center;
    z-index: 20;
  }
  #overlay h1 { font-size: 48px; margin: 0 0 12px; text-shadow: 3px 3px 0 #000; }
  #overlay p { font-size: 20px; margin: 4px; }
  #overlay button {
    margin-top: 18px;
    padding: 10px 24px;
    font-size: 18px;
    font-family: monospace;
    background: #e52521;
    color: #fff;
    border: 3px solid #fff;
    cursor: pointer;
  }
  #controls {
    position: absolute;
    bottom: 8px;
    left: 12px;
    font-family: monospace;
    font-size: 13px;
    opacity: 0.85;
    text-shadow: 1px 1px 0 #000;
    z-index: 10;
  }
  #touch-controls {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 15;
    display: none;
    touch-action: none;
  }
  #touch-controls .pad {
    position: absolute;
    bottom: max(24px, env(safe-area-inset-bottom, 0px));
    display: flex;
    gap: 18px;
    pointer-events: auto;
    touch-action: none;
  }
  #touch-controls .left-pad { left: max(24px, env(safe-area-inset-left, 0px)); }
  #touch-controls .right-pad { right: max(24px, env(safe-area-inset-right, 0px)); }
  #touch-controls .btn {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: rgba(255,255,255,0.28);
    border: 3px solid rgba(255,255,255,0.75);
    color: #fff;
    font-family: monospace;
    font-size: 34px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 2px 2px 0 #000;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    box-shadow: 0 4px 0 rgba(0,0,0,0.35);
  }
  #touch-controls .btn.run { background: rgba(229,37,33,0.5); font-size: 18px; }
  #touch-controls .btn.jump {
    background: rgba(60,180,75,0.5);
    width: 104px;
    height: 104px;
    font-size: 22px;
  }
  #touch-controls .btn.pressed {
    background: rgba(255,255,255,0.6);
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.35);
  }
  body.touch #touch-controls { display: block; }
  body.touch #controls { display: none; }
  @media (pointer: coarse), (max-width: 900px) {
    #touch-controls { display: block; }
    #controls { display: none; }
  }
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <div class="group"><img src="sprites/extracted/sprite_000.png" alt="lives"/>×<span id="lives">3</span></div>
    <div class="group"><img src="sprites/extracted/sprite_042.png" alt="coins"/>×<span id="coins">0</span></div>
    <div class="group">WORLD 1-1</div>
    <div class="group">SCORE <span id="score">0</span></div>
  </div>
  <div id="world"></div>
  <div id="controls">← → move &nbsp; SHIFT run &nbsp; SPACE / ↑ jump &nbsp; R restart</div>
  <div id="touch-controls">
    <div class="pad left-pad">
      <div class="btn" data-key="ArrowLeft">◀</div>
      <div class="btn" data-key="ArrowRight">▶</div>
    </div>
    <div class="pad right-pad">
      <div class="btn run" data-key="ShiftLeft">RUN</div>
      <div class="btn jump" data-key="Space">JUMP</div>
    </div>
  </div>
  <div id="overlay">
    <h1 id="overlay-title">GAME OVER</h1>
    <p id="overlay-sub"></p>
    <button onclick="Game.restart()">PLAY AGAIN</button>
  </div>
</div>
<script src="game.js"></script>
<script>
  (function setupTouchControls() {
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    if (isTouch) document.body.classList.add('touch');

    // Disable double-tap zoom and long-press context menu inside the game.
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('contextmenu', (e) => {
      if (e.target.closest('#touch-controls')) e.preventDefault();
    });

    const buttons = Array.from(document.querySelectorAll('#touch-controls .btn'));
    const fire = (type, code) => {
      window.dispatchEvent(new KeyboardEvent(type, { code, key: code, bubbles: true }));
    };
    const press = (btn) => {
      if (!btn || btn.classList.contains('pressed')) return;
      btn.classList.add('pressed');
      fire('keydown', btn.dataset.key);
    };
    const release = (btn) => {
      if (!btn || !btn.classList.contains('pressed')) return;
      btn.classList.remove('pressed');
      fire('keyup', btn.dataset.key);
    };
    const releaseAll = () => buttons.forEach(release);

    // Map: pointerId -> currently pressed button, so dragging across buttons works.
    const active = new Map();
    const btnAtPoint = (x, y) => {
      const el = document.elementFromPoint(x, y);
      return el ? el.closest('#touch-controls .btn') : null;
    };

    const root = document.getElementById('touch-controls');
    root.addEventListener('pointerdown', (e) => {
      const btn = btnAtPoint(e.clientX, e.clientY);
      if (!btn) return;
      e.preventDefault();
      active.set(e.pointerId, btn);
      press(btn);
    });
    root.addEventListener('pointermove', (e) => {
      if (!active.has(e.pointerId)) return;
      e.preventDefault();
      const prev = active.get(e.pointerId);
      const next = btnAtPoint(e.clientX, e.clientY);
      if (next === prev) return;
      release(prev);
      if (next) {
        active.set(e.pointerId, next);
        press(next);
      } else {
        active.delete(e.pointerId);
      }
    });
    const endPointer = (e) => {
      const btn = active.get(e.pointerId);
      if (!btn) return;
      e.preventDefault();
      release(btn);
      active.delete(e.pointerId);
    };
    root.addEventListener('pointerup', endPointer);
    root.addEventListener('pointercancel', endPointer);
    root.addEventListener('pointerleave', endPointer);

    // Safety: release everything if window loses focus or tab is hidden.
    window.addEventListener('blur', releaseAll);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) releaseAll();
    });
  })();
</script>
</body>
</html>
